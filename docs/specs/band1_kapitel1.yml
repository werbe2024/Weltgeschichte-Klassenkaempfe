chapter:
  id: "1914-1918"
  title: "Der 1. Weltkrieg als imperialistischer Raubkrieg und seine Folgen bis heute"
  sources:
    - author: "Lenin"
      year: 1916
      title: "Der Imperialismus als höchstes Stadium des Kapitalismus"
      ref: "MEW Bd. 22, S. 201–205"
      url: "https://www.marxists.org/deutsch/archiv/lenin/werke/1916/imperial/index.htm"
    - author: "Holmberg, Nils"
      year: 1976
