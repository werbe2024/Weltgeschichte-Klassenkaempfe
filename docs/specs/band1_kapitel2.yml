chapter:
  id: "1917-1923"
  title: "Die Russische Revolution: Triumph und Bürokratisierung"
  sources:
    - author: "Lenin"
      year: 1917
      title: "Staat und Revolution"
      ref: "MEW Bd. 25, S. 393–494"
      url: "https://www.marxists.org/deutsch/archiv/lenin/werke/1917/staat-rev/index.htm"
    - author: "Trotzki"
      year: 1936
      title: "Verratene Revolution"
      ref: "Kapitel 9: 'Der Thermidor der russischen Revolution'"
      url: "https://www.marxists.org/deutsch/archiv/trotzki/1936/verratene-revolution/"
  bmad:
    background: |
      ### Februar vs. Oktober 1917
      - **Februar**: Sturz des Zaren – **bourgeoise Revolution** (Provisorische Regierung).
      - **Oktober**: Bolschewiki übernehmen die Macht – **proletarische Revolution**.
      - **Schlüsseldokumente**:
        - Lenins *Aprilthesen* ("Alle Macht den Sowjets!").
        - Trotzkis *Geschichte der russischen Revolution* (Analyse der Doppelmacht).
    method: |
      ### Rätedemokratie vs. Bürokratie
      - **These**: Sowjets als Organe der Arbeitermacht (Lenin 1917).
      - **Antithese**: Bürokratisierung ab 1921 (NEP, Parteihierarchie).
      - **Synthese**: Stalins "Sozialismus in einem Land" (1924) als **Gegenrevolution**.
    analysis: |
      - **1917–1921**: "Kriegskommunismus" – Notwendigkeit oder Fehler?
      - **1921**: Kronstädter Aufstand – **Arbeiter gegen Bolschewiki**.
      - **1923**: Lenins "Testament" warnt vor Stalin – **ignoriert**.
    discussion: |
      ### Lehren für heutige Revolutionen
      1. **Kein Sozialismus ohne Demokratie**:
         - Rätemodell vs. Einparteienherrschaft (vgl. Rojava heute).
      2. **Bürokratie ist die größte Gefahr**:
         - Trotzkis Warnung: "Die Bürokratie erstickt die Revolution."
      3. **Internationale Solidarität**:
         - Warum scheiterte die Weltrevolution 1918–1923?
      **🔥 Aufruf**:
      *"Studiert die russische Revolution – nicht als Mythos, sondern als Kampf um echte Arbeiterdemokratie!"*
