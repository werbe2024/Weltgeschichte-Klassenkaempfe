name: Generate Outputs
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
      - name: Create output directory
        run: mkdir -p docs/output
      - name: Generate HTML for 1917-1923
        run: |
          pandoc docs/bands/1917-1923.md -o docs/output/1917-1923.html --toc
      - name: Generate PDF for 1917-1923
        run: |
          pandoc docs/bands/1917-1923.md -o docs/output/1917-1923.pdf --latex-engine=xelatex
